<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nhận diện vật thể</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f6fa;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .preview-img, .preview-video {
            max-width: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- Header -->
    <div class="text-center mb-4">
        <h2>🚀 Hệ thống nhận diện vật thể</h2>
        <p class="text-muted">Upload ảnh hoặc video để nhận diện bằng YOLO</p>
    </div>

    <div class="row">

        <!-- Upload -->
        <div class="col-md-4">
            <div class="card p-4">
                <h5 class="mb-3">📤 Tải file lên</h5>

                <form method="POST" enctype="multipart/form-data">
                    <input type="file" name="file" class="form-control mb-3" required>
                    <button class="btn btn-primary w-100">Upload & Detect</button>
                </form>
            </div>
        </div>

        <!-- Kết quả -->
        <div class="col-md-8">
            <div class="card p-4">
                <h5 class="mb-3">📊 Kết quả nhận diện</h5>

                <!-- ẢNH -->
                {% if image_result %}
                    <h6>Ảnh kết quả:</h6>
                    <img src="{{ url_for('static', filename=image_result) }}" class="preview-img mb-3">
                {% endif %}

                <!-- VIDEO -->
                {% if video %}
                    <h6>Video realtime:</h6>
                    <img src="{{ url_for('video_feed') }}" class="preview-video">
                {% endif %}

                {% if not image_result and not video %}
                    <p class="text-muted">Chưa có dữ liệu</p>
                {% endif %}

            </div>
        </div>

    </div>

</div>

</body>
</html>
